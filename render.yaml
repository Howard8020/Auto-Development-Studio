services:
  - type: web
    name: auto-development-studio
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && npm install && npm run build
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: APP_NAME
        value: Auto Studio
      - key: DEBUG
        value: "false"
      - key: DATABASE_URL
        value: sqlite:///./data/studio.db
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        generateValue: true