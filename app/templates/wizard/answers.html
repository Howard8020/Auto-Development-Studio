{% extends "base.html" %}
{% block title %}Project Details — {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-12" x-data="{
    projectName: 'my-app',
    tagline: 'Built with Auto Development Studio',
    brandColor: '#ff6600',
    useAuth: 'yes',
    useDb: 'yes',
    models: 'User',
    pages: 'Home, About, Dashboard',
    extras: '',
    deployTarget: 'render'
}">
    <div class="mb-8">
        <div class="flex items-center gap-3 mb-2">
            <span class="bg-brand-500 text-white text-xs font-bold px-3 py-1 rounded-full">STEP 2 OF 3</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900">Project details</h1>
        <p class="text-gray-500 mt-2">Let's refine your project with a few specific choices.</p>
    </div>
    <form method="POST" action="/wizard/save-answers" class="space-y-6">
        <div class="bg-white p-6 rounded-xl border border-gray-200 space-y-5">
            <div class="grid md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Project Name</label>
                    <input type="text" name="project_name" x-model="projectName" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tagline</label>
                    <input type="text" name="tagline" x-model="tagline" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Brand Color</label>
                <div class="flex items-center gap-3">
                    <input type="color" name="brand_color" x-model="brandColor" class="w-10 h-10 rounded-lg cursor-pointer border border-gray-300">
                    <input type="text" x-model="brandColor" class="px-4 py-2.5 border border-gray-300 rounded-lg w-32 text-sm font-mono focus:ring-2 focus:ring-brand-500 focus:border-transparent" readonly>
                </div>
            </div>
            <div class="grid md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">User Authentication</label>
                    <select name="use_auth" x-model="useAuth" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                        <option value="yes">Yes (Google OAuth)</option>
                        <option value="no">No</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Database</label>
                    <select name="use_db" x-model="useDb" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                        <option value="yes">Yes (SQLite)</option>
                        <option value="no">No</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Data Models <span class="text-gray-400 font-normal">(comma-separated)</span></label>
                <input type="text" name="models" x-model="models" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent" placeholder="User, Product, Order, Invoice">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Pages <span class="text-gray-400 font-normal">(comma-separated)</span></label>
                <input type="text" name="pages" x-model="pages" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent" placeholder="Home, About, Dashboard, Profile">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Extra Features</label>
                <textarea name="extras" x-model="extras" rows="2" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent" placeholder="Email notifications, file uploads, search..."></textarea>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Deploy Target</label>
                <select name="deploy_target" x-model="deployTarget" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                    <option value="render">Render</option>
                    <option value="fly">Fly.io</option>
                    <option value="railway">Railway</option>
                    <option value="docker">Docker</option>
                </select>
            </div>
        </div>
        <div class="flex justify-between">
            <a href="/wizard" class="px-8 py-3 border border-gray-300 text-gray-700 font-semibold rounded-xl hover:bg-gray-50 transition-all">← Back</a>
            <button type="submit" class="px-8 py-3 brand-bg text-white font-semibold rounded-xl brand-hover transition-all">Preview →</button>
        </div>
    </form>
</div>
{% endblock %}
