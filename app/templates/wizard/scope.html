{% extends "base.html" %}
{% block title %}New Project — {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-3xl mx-auto px-4 py-12" x-data="{ scope: '' }">
    <div class="mb-8">
        <div class="flex items-center gap-3 mb-2">
            <span class="bg-brand-500 text-white text-xs font-bold px-3 py-1 rounded-full">STEP 1 OF 3</span>
        </div>
        <h1 class="text-3xl font-bold text-gray-900">Describe your project</h1>
        <p class="text-gray-500 mt-2">Tell us what you're building. Be as detailed as you like — the more context, the better the output.</p>
    </div>
    <form method="POST" action="/wizard/save-scope" class="space-y-6">
        <div>
            <label for="scope" class="block text-sm font-medium text-gray-700 mb-2">Project Scope</label>
            <textarea id="scope" name="scope" x-model="scope" rows="8"
                class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-transparent resize-y text-gray-900"
                placeholder="Example: I want to build a SaaS app that helps small businesses manage their customer relationships. It needs a dashboard, contact management, email integration, and basic reporting. Users should be able to sign up with Google and manage their team members."></textarea>
        </div>
        <div class="flex justify-between items-center">
            <p class="text-sm text-gray-500" x-text="scope.length + ' characters'"></p>
            <button type="submit"
                class="px-8 py-3 brand-bg text-white font-semibold rounded-xl brand-hover transition-all duration-200"
                :disabled="scope.length < 20"
                :class="scope.length < 20 ? 'opacity-50 cursor-not-allowed' : ''">
                Continue →
            </button>
        </div>
        <p class="text-xs text-gray-400" x-show="scope.length > 0 && scope.length < 20">Please enter at least 20 characters.</p>
    </form>
</div>
{% endblock %}
