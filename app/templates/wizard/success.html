{% extends "base.html" %}
{% block title %}Project Generated — {{ app_name }}{% endblock %}
{% block content %}
<div class="max-w-2xl mx-auto px-4 py-20 text-center">
    <div class="w-20 h-20 brand-bg rounded-full flex items-center justify-center mx-auto mb-6">
        <span class="text-white text-4xl">✓</span>
    </div>
    <h1 class="text-3xl font-bold text-gray-900 mb-2">Project generated!</h1>
    <p class="text-gray-500 mb-8">Your project <strong class="text-gray-900">{{ name }}</strong> is ready to download.</p>
    <div class="flex justify-center gap-4">
        <a href="/wizard/download/{{ name }}"
           class="inline-flex items-center px-8 py-4 brand-bg text-white font-semibold rounded-xl brand-hover transition-all duration-200 shadow-lg">
            ⬇ Download ZIP
        </a>
        <a href="/wizard"
           class="inline-flex items-center px-8 py-4 border-2 border-gray-300 text-gray-700 font-semibold rounded-xl hover:border-gray-400 transition-all duration-200">
            Start Another
        </a>
    </div>
    <p class="text-sm text-gray-400 mt-8">
        Extract the ZIP and run <code class="bg-gray-100 px-2 py-0.5 rounded text-sm">uv sync && uvicorn app.main:app --reload</code>
    </p>
</div>
{% endblock %}
