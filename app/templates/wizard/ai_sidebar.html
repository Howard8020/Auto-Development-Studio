{% if ai_enabled %}
<div x-data="{
    open: false, category: 'business_objectives', suggestion: '', loading: false,
    categories: [
        {id:'business_objectives',label:'Business Goals'}, {id:'pain_points',label:'Pain Points'},
        {id:'success_vision',label:'Success Vision'}, {id:'target_users',label:'Target Users'},
        {id:'user_roles',label:'Roles & Permissions'}, {id:'must_have_features',label:'Must-Have Features'},
        {id:'should_have_features',label:'Should-Have Features'}, {id:'integrations',label:'Integrations'},
        {id:'tech_stack',label:'Tech Stack'}, {id:'design_requirements',label:'Design Requirements'},
        {id:'performance',label:'Performance'}, {id:'compliance',label:'Compliance'},
        {id:'in_scope',label:'In Scope'}, {id:'out_of_scope',label:'Out of Scope'},
        {id:'kpis',label:'KPIs'}, {id:'analytics',label:'Analytics'},
        {id:'risks',label:'Risks'}, {id:'assumptions',label:'Assumptions'},
    ],
    async suggest() {
        this.loading=true; this.suggestion='';
        const allAnswers={};
        this.categories.forEach(c=>{const el=document.querySelector('textarea[name="'+c.id+'"], input[name="'+c.id+'"]');if(el) allAnswers[c.id]=el.value||'';});
        try {
            const resp=await fetch('/wizard/ai-suggest',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({category:this.category,current_answers:allAnswers})});
            this.suggestion=(await resp.json()).suggestion||'No suggestion.';
        } catch(e){this.suggestion='Error: '+e.message;}
        this.loading=false;
    },
    useSuggestion(){const ta=document.querySelector('textarea[name="'+this.category+'"]');if(ta&&this.suggestion){ta.value=this.suggestion;this.open=false;}}
}">
    <button type="button" @click="open=!open"
        style="position:fixed;bottom:2rem;right:2rem;z-index:50;width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(99,102,241,0.4);display:flex;align-items:center;justify-content:center;"
        :style="open?'transform:rotate(45deg);':''" title="AI Assistant">
        <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z"/></svg>
    </button>
    <div x-show="open" x-cloak @click.away="open=false"
        style="position:fixed;bottom:6rem;right:2rem;z-index:49;width:380px;max-height:500px;overflow-y:auto;background:var(--bg-card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:0 8px 32px rgba(0,0,0,0.5);padding:1.5rem;">
        <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;">
            <svg width="18" height="18" fill="none" stroke="var(--accent-light)" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.813 15.904L9 18.75l-.813-2.846a4.5 4.5 0 00-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 003.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 003.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 00-3.09 3.09zM18.259 8.715L18 9.75l-.259-1.035a3.375 3.375 0 00-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 002.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 002.455 2.456L21.75 6l-1.036.259a3.375 3.375 0 00-2.455 2.456z"/></svg>
            <span style="font-size:0.9375rem;font-weight:600;color:white;">AI Assistant</span>
        </div>
        <label class="ads-label">Question you need help with</label>
<select x-model="category" style="width:100%;padding:0.5rem 0.625rem;border-radius:var(--r-sm);border:1px solid var(--border);background:var(--bg-surface);color:var(--text);font-size:0.8125rem;margin-bottom:1rem;">
            <template x-for="c in categories" :key="c.id">
                <option :value="c.id" x-text="c.label"></option>
            </template>
        </select>
        <button type="button" @click="suggest()" :disabled="loading"
            style="width:100%;padding:0.5rem;border-radius:var(--r-sm);border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-size:0.8125rem;font-weight:500;cursor:pointer;">
            <span x-show="!loading">Suggest Answer</span>
            <span x-show="loading">Thinking...</span>
        </button>
        <div x-show="suggestion" x-cloak style="margin-top:1rem;">
            <label class="ads-label">Suggested Answer</label>
            <div style="padding:0.75rem;background:var(--bg-surface);border-radius:var(--r-sm);font-size:0.8125rem;color:var(--text);line-height:1.6;white-space:pre-wrap;max-height:200px;overflow-y:auto;" x-text="suggestion"></div>
            <button type="button" @click="useSuggestion()" style="margin-top:0.5rem;padding:0.375rem 1rem;border-radius:var(--r-sm);border:1px solid var(--accent);background:transparent;color:var(--accent-light);font-size:0.8125rem;cursor:pointer;">Use This Answer</button>
        </div>
    </div>
</div>
{% endif %}
