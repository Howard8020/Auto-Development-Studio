<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{{ app_name }}{% endblock %}</title>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
    <link href="/static/css/output.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .brand-bg { background: linear-gradient(135deg, #ff6600, #ff8533); }
        .brand-text { color: #ff6600; }
        .brand-border { border-color: #ff6600; }
        .brand-hover:hover { background: linear-gradient(135deg, #e65c00, #ff7720); }
        .gradient-text { background: linear-gradient(135deg, #ff6600 0%, #ff8533 50%, #fb923c 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .upload-zone { border: 2px dashed #d1d5db; transition: all .2s; cursor: pointer; }
        .upload-zone:hover, .upload-zone.dragover { border-color: #ff6600; background: #fff7ed; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 min-h-screen flex flex-col">
    <nav class="bg-white shadow-sm border-b border-gray-200" x-data="{ mobileOpen: false }">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                     <a href="/" class="flex items-center gap-2"><img src="{{ url_for('static', path='images/logo.svg') }}" alt="Auto Dev Studio" class="h-9 w-auto"></a>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <a href="/wizard" class="text-gray-600 hover:text-gray-900 font-medium">New Project</a>
                    {% if user %}
                    <a href="/dashboard" class="text-gray-600 hover:text-gray-900 font-medium">Dashboard</a>
                    <a href="/logout" class="text-gray-600 hover:text-gray-900 font-medium">Logout</a>
                    <span class="text-sm text-gray-500">{{ user.name }}</span>
                    {% else %}
                    <a href="/login" class="text-gray-600 hover:text-gray-900 font-medium">Sign In</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>
    <main class="flex-1">{% block content %}{% endblock %}</main>
    <footer class="bg-white border-t border-gray-200 py-8 mt-auto">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 text-sm">
            <div class="flex items-center justify-center gap-2 mb-2">
                <div class="w-5 h-5 rounded-md flex items-center justify-center" style="background: linear-gradient(135deg, #ff6600, #ff8533);">
                    <svg width="10" height="10" viewBox="0 0 92 92" fill="none">
                        <path d="M26 70 L46 20 L66 70" stroke="white" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                        <polygon points="43,48 43,60 54,54" fill="white" opacity="0.9"/>
                    </svg>
                </div>
                <span class="font-semibold text-gray-600">Auto Studio</span>
                <span class="text-[9px] tracking-[2px] font-semibold text-gray-400 uppercase">Building Apps with AI</span>
            </div>
            &copy; 2026 Auto Studio.
        </div>
    </footer>
</body>
</html>
